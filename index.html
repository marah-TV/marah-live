<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Marah TV</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0c0f12;
  font-family: Tahoma, "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center; 
  height: 100vh;
  overflow: hidden;
  padding: 0;
}

/* حاوية اللعبة الثابتة والمضمونة */
.game-container {
  position: relative;
  width: 100vw;
  height: calc(100vw * (740 / 420));
  max-width: 420px; 
  max-height: 740px;
  background: url("munirmunir.jpg");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  font-size: 16px; 
}

/* شاشات الكمبيوتر: ملاءمة الطول ومنع التمرير */
@media (min-height: 740px) and (min-width: 420px) {
  .game-container {
    height: 740px;
    width: 420px;
  }
}
@media (max-height: 739px) and (min-width: 420px) {
  .game-container {
    height: 100vh;
    width: calc(100vh * (420 / 740));
  }
}

/* استخدام الـ em لربط الخطوط بالحاوية مباشرة لمنع أي تحرك نهائياً */
#logo {
  position: absolute;
  top: 1.35%;
  left: 52.38%;
  font-size: 0.8em;
  font-weight: bold;
}

#clock {
  position: absolute;
  top: 1.8%;
  left: 17.5%;

  font-size: 0.95em;
  font-weight: bold;
  color: #ffffff;
}

#nameBox1 {
  position: absolute;
  top: 13.0%;
  left: 37.5%;
  width: 41.5%;
  height: 4.2%;
  text-align: center;
  font-weight: bold;
  font-size: 1.05em;
  display: flex;
  justify-content: center;
  align-items: center;
}

#msgBox1 {
  position: absolute;
  top: 17.5%;
  left: 37.5%;
  width: 41.5%;
  height: 11.5%;
  text-align: center;
  font-size: 0.95em;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  white-space: nowrap;
}

#nameBox2 {
  position: absolute;
  top: 30.7%;

  height: 4.2%;
  text-align: center;
  font-weight: bold;
  font-size: 1.05em;
  display: flex;
  justify-content: center;
  align-items: center;
}

#msgBox2 {
  position: absolute;
  top: 35.2%;
  left: 37.5%;
  width: 41.5%;
  height: 11.5%;
  text-align: center;
  font-size: 0.95em;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  white-space: nowrap;
}

/* تم تعديل مكان لوحة الترتيب لتظهر بدقة داخل المربع الذهبي المخصص لها على اليسار */
#winsBoard {
  position: absolute;
  top: 52.8%;
  left: 4.0%;
  width: 27.5%;
  height: 14.2%;
  font-size: 0.8em;
  font-weight: bold;
  color: #ffffff;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
}

#gameStatus {
  position: absolute;
  top: 71.5%;
  left: 32.0%;
  width: 37.0%;
  text-align: center;
  font-size: 0.82em;
  font-weight: bold;
  color: #ffffff;
}

#countdown {
  position: absolute;
  top: 74.0%;
  left: 10.5%;
  width: 14.0%;
  text-align: center;

/* زر الإدارة الشفاف تم نقله إلى أسفل اليمين ليتطابق مع نص الإدارة المطبوع في الخلفية */
#adminBtn {
  position: absolute;
  top: 94.0%;
  right: 2.0%;
  width: 25.0%;
  height: 5.5%;
  background: transparent;
  color: transparent;
  border: none;
  cursor: pointer;
  z-index: 20;
}

#autoStatus {
  position: absolute;
  top: 94.8%;
  left: 27.0%;
  width: 46.0%;
  text-align: center;
  font-size: 0.95em;
  font-weight: bold;
  color: #ff00ff;
}

#adminPanel {
  position: absolute;
  bottom: 16%;
  right: 5%;
  width: 50%;
  background: rgba(0, 0, 0, 0.9);
  border: 2px solid #ff00ff;
  padding: 8px;
  border-radius: 6px;
  z-index: 100;
  text-align: center;
}
#adminPanel button {
  width: 100%;
  margin: 4px 0;
  padding: 6px;
  font-size: 0.8em;
  font-weight: bold;
  cursor: pointer;
  background: #222;

  border: 1px solid #aaa;

</style>

</head>

<body>

<div class="game-container" id="mainContainer">

<div id="clock"></div>

<!-- إطارات الرسائل والأسماء -->
<div id="nameBox1"></div>
<div id="msgBox1"></div>
<div id="nameBox2"></div>
<div id="msgBox2"></div>

<div id="gameStatus">
🚦 الاستعدَاد للجولة القادمة
</div>

<div id="countdown">
--
</div>

<div id="targetNumber">
؟
</div>

<div id="gameWinner">
🏆 لا يوجد فائز بعد
</div>

<!-- لوحة الترتيب داخل البرواز الذهبي المخصص لها تماماً -->
<div id="winsBoard">
جاري التحميل...
</div>

<div id="playersCount">
0
</div>

<div id="autoStatus">
🤖 الروبوت: يعمل
</div>

<!-- زر إدارة شفاف يغطي مكان زر الإدارة أسفل اليمين تماماً -->
<button id="adminBtn">
⚙️ الإدارة
</button>

<div id="adminPanel" style="display:none;">
<button id="startRound">▶️ بدء جولة</button>
<button id="toggleBot">🤖 تشغيل/إيقاف الروبوت</button>
</div>

</div>

<script type="module">

// سكريبت لتثبيت الخطوط والعناصر بنسبة 100% عند تصغير وتكبير المتصفح
function resizeGame() {
  const container = document.getElementById("mainContainer");
  if (container) {
    const currentWidth = container.offsetWidth;
    container.style.fontSize = (currentWidth / 420) * 16 + "px";
  }
}
window.addEventListener("resize", resizeGame);
window.addEventListener("DOMContentLoaded", resizeGame);

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
set,
remove,
get,
update
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
const firebaseConfig = {
apiKey: "AIzaSyD8yIx-iVO4kCC-92lVHAzrVB7ye6ncbes",
authDomain: "marah-tv-ed147.firebaseapp.com",
databaseURL: "https://marah-tv-ed147-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "marah-tv-ed147",
storageBucket: "marah-tv-ed147.firebasestorage.app",
messagingSenderId: "868399469455",
appId: "1:868399469455:web:15fc7d07b342574c5e71fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gameRef = ref(db,"game");
const messagesRef = ref(db,"messages");
const winsRef = ref(db,"wins");
  
let countdownStarted = false;
let countdown = 15;
setInterval(()=>{
const clk = document.getElementById("clock");
if(clk) clk.textContent = new Date().toLocaleTimeString("ar", {hour: '2-digit', minute:'2-digit', second:'2-digit'});
},1000);

onValue(messagesRef,(snapshot)=>{

const data = snapshot.val();

if(!data) return;

const sorted = Object.values(data).sort((a,b)=>b.time-a.time);

// تنظيف الكلمات العشوائية فوراً ودون ترك ثلاث نقاط تشوه المظهر
const cleanText = (txt) => {
  if (!txt) return "";
  if (txt.includes("نينيتيم") || txt.includes("بزينين") || txt.length > 30) {
    return ""; // يتم تصفير النص العشوائي تماماً لتنظيف الشاشة
  }
  return txt;
};

if(sorted[0]) {
  if(document.getElementById("nameBox1")) document.getElementById("nameBox1").textContent = sorted[0].name;
  if(document.getElementById("msgBox1")) document.getElementById("msgBox1").textContent = cleanText(sorted[0].text);
}
if(sorted[1]) {
  if(document.getElementById("nameBox2")) document.getElementById("nameBox2").textContent = sorted[1].name;
  if(document.getElementById("msgBox2")) document.getElementById("msgBox2").textContent = cleanText(sorted[1].text);
}

});
let botEnabled = true;
let gameRunning = false;

function startGame(){

if(gameRunning) return;

gameRunning = true;

let countdown = 10;

const countdownBox =
document.getElementById("countdown");

const statusBox =
document.getElementById("gameStatus");

const numberBox =
document.getElementById("targetNumber");

statusBox.textContent =
"🚦 استعدوا للجولة القادمة";

numberBox.textContent =
"؟";
const interval = setInterval(()=>{

countdownBox.textContent = countdown;

countdown--;

if(countdown < 0){

clearInterval(interval);

statusBox.textContent =
"🎮 لعبة الرقم السريع";

gameRunning = false;

}

},1000);

}
onValue(gameRef,(snapshot)=>{

const data = snapshot.val();

if(!data) return;

if(data.targetNumber){
document.getElementById("targetNumber").textContent = data.targetNumber;
}

if(data.winner){

document.getElementById("gameWinner").textContent =
"🏆 الفائز: " + data.winner;

if(botEnabled){

setTimeout(()=>{

startNewRound();

},5000);

}

}else{

document.getElementById("gameWinner").textContent =
"🏆 لا يوجد فائز بعد";

}
  
});

document.getElementById("toggleBot").addEventListener("click",()=>{

update(gameRef,{
botEnabled: !botEnabled
});

});
onValue(gameRef,(snapshot)=>{

const data = snapshot.val();

if(!data) return;

if(data.status === "countdown"){

document.getElementById("gameStatus").textContent =
"🚦 استعدوا للجولة القادمة";

document.getElementById("countdown").textContent = data.countdown;

document.getElementById("targetNumber").textContent = "؟";

}

botEnabled = data.botEnabled;

document.getElementById("autoStatus").textContent =
botEnabled ? "المشرف كونترول: منير" : "المشرف كونترول: متوقف";

});
  
document.getElementById("adminBtn").addEventListener("click",()=>{

const pass = prompt("أدخل كلمة المرور");

if(pass !== "3"){
alert("كلمة المرور غير صحيحة");
return;
}

const panel =
document.getElementById("adminPanel");

if(panel.style.display === "none"){

panel.style.display = "block";

}else{

panel.style.display = "none";

}

});
document.getElementById("startRound").addEventListener("click",()=>{

update(gameRef,{
countdown: 10,
status: "countdown",
winner: ""
});

let count = 10;

const timer = setInterval(()=>{

count--;

update(gameRef,{
countdown: count
});

if(count <= 0){

clearInterval(timer);

const targetNumber =
Math.floor(Math.random() * 100) + 1;

update(gameRef,{
targetNumber: targetNumber,
status: "playing",
winner: ""
});

}

},1000);

});

function startNewRound(){

update(gameRef,{
countdown: 10,
status: "countdown",
winner: ""
});

let count = 10;

const timer = setInterval(()=>{

count--;

update(gameRef,{
countdown: count
});

if(count <= 0){

clearInterval(timer);

const targetNumber =
Math.floor(Math.random() * 100) + 1;

update(gameRef,{
targetNumber: targetNumber,
status: "playing",
winner: ""
});

}

},1000);

}

onValue(winsRef,(snapshot)=>{

const board =
document.getElementById("winsBoard");

const data = snapshot.val();

if(!data){
board.innerHTML = "";
return;
}

const players =
Object.entries(data)
.sort((a,b)=>b[1].wins - a[1].wins);
const topPlayers = players.slice(0,3);
let html = "";

topPlayers.forEach(([name,info],index)=>{

let medal = "🏅";

if(index === 0) medal = "🥇";
if(index === 1) medal = "🥈";
if(index === 2) medal = "🥉";

html += medal + " " + name + " : " + info.wins + "<br>";

});

board.innerHTML = html;

});
  
startGame();
resizeGame();
</script>

</body>
</html>
