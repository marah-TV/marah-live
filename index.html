/* شاشات الكمبيوتر: ملاءمة الطول ومنع التمرير */

  .game-container {
    height: 740px;
    width: 420px;
  }
}

let normalMessages = [];
let currentIndex = 0;
let lastShown = [];
function cleanText(txt){

  if(!txt) return "";

  if(/^\d+$/.test(txt)) return "";

  return txt.substring(0,120);

}

onValue(messagesRef,(snapshot)=>{

  const data = snapshot.val();

  if(!data) return;

  normalMessages = Object.values(data)
  .filter(msg =>
    !/^\d+$/.test(msg.text) &&
    msg.text &&
    msg.text.length > 1
  )
  .sort((a,b)=>b.time-a.time)
  .slice(0,100)
  .reverse();

});
setInterval(()=>{

  if(normalMessages.length < 2) return;

  let availableMessages = normalMessages.filter(
msg => !lastShown.includes(msg.name + msg.text)
);

if(availableMessages.length < 2){

lastShown = [];

availableMessages = [...normalMessages];

}

const msg1 = availableMessages[0];

const msg2 = availableMessages[1];

lastShown.push(msg1.name + msg1.text);
lastShown.push(msg2.name + msg2.text);

if(lastShown.length > 20){

lastShown = lastShown.slice(-20);

  document.getElementById("nameBox1").textContent =

  cleanText(msg1.text);

  document.getElementById("nameBox2").textContent =
  msg2.name || "";

  document.getElementById("msgBox2").textContent =
  cleanText(msg2.text);

document.getElementById("adminBtn").addEventListener("click",()=>{

alert("كلمة المرور غير صحيحة");
return;
}

const panel =
document.getElementById("adminPanel");

panel.style.display = "block";

}else{

panel.style.display = "none";

}

});
document.getElementById("startRound").addEventListener("click",()=>{

update(gameRef,{
countdown: 10,
status: "countdown",
winner: ""
});

let count = 10;

const timer = setInterval(()=>{

count--;

update(gameRef,{
countdown: count
});

if(count <= 0){

clearInterval(timer);

const targetNumber =
Math.floor(Math.random() * 100) + 1;

update(gameRef,{
targetNumber: targetNumber,
status: "playing",
winner: ""
});

}

},1000);

});

onValue(winsRef,(snapshot)=>{

const board =
document.getElementById("winsBoard");

const data = snapshot.val();

if(!data){
board.innerHTML = "🏆 ترتيب اللاعبين";
return;
}

const players =
Object.entries(data)
.sort((a,b)=>b[1].wins - a[1].wins);
const topPlayers = players.slice(0,3);
let html = "🏆 ترتيب اللاعبين<br><br>";

topPlayers.forEach(([name,info],index)=>{

let medal = "🏅";

if(index === 0) medal = "🥇";
if(index === 1) medal = "🥈";
if(index === 2) medal = "🥉";

html += medal + " " + name + " : " + info.wins + "<br>";

});

board.innerHTML = html;

});
onValue(playersRef,(snapshot)=>{

const players = snapshot.val();

const countBox =
document.getElementById("playersCount");

if(!players){

countBox.textContent = "👥 0";
return;

}

const count =
Object.keys(players).length;

countBox.textContent =
"👥 " + count;

});
onValue(playersRef,(snapshot)=>{

const players = snapshot.val();

const box =
document.getElementById("playersList");

if(!players){

box.innerHTML = "👥 المشاركون";

return;

}

let html = "👥 المشاركون<br>";

Object.keys(players).forEach(name=>{

html += "👤 " + name + "<br>";

});
onValue(playersRef, (snapshot) => {

  const players = snapshot.val();

  if(!players) return;

  const names = Object.keys(players);

  if(names[0]){
    document.getElementById("nameBox1").textContent = names[0];
  }

  if(names[1]){
    document.getElementById("nameBox2").textContent = names[1];
  }

});

box.innerHTML = html;

});
resizeGame();
