<!DOCTYPE html>

<title>Marah TV</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0c0f12;
  font-family: Tahoma, "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center; 
  height: 100vh;
  overflow: hidden;
  padding: 0;
}

/* حاوية اللعبة الثابتة والمضمونة */
.game-container {
  position: relative;
  width: 100vw;
  height: calc(100vw * (740 / 420));
  max-width: 420px; 
  max-height: 740px;
  background: url("munirmunir.jpg");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  /* تحديد خط أساسي ديناميكي سيتم التحكم به عبر السكريبت للتثبيت الكامل */
  font-size: 16px; 
}

/* شاشات الكمبيوتر: ملاءمة الطول ومنع التمرير */
@media (min-height: 740px) and (min-width: 420px) {
  .game-container {
    height: 740px;
    width: 420px;
  }
}
@media (max-height: 739px) and (min-width: 420px) {
  .game-container {
    height: 100vh;
    width: calc(100vh * (420 / 740));
  }
}

#designGrid{

/* خطوط الشبكة */
#designGrid::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:
    linear-gradient(to right,
      rgba(255,255,255,0.25) 1px,
      transparent 1px),
    linear-gradient(to bottom,
      rgba(255,255,255,0.25) 1px,

/* أرقام الأعلى */

<body>

<div class="game-container" id="mainContainer">
<div id="designGrid">
  <div class="topLabels">
    <span style="left:0%">0</span>

    <span style="top:50%">50</span>
    <span style="top:60%">60</span>
    <span style="top:70%">70</span>
    <span style="top:80%">80</span>
    <span style="top:90%">90</span>
    <span style="top:98%">100</span>
  </div>
</div>
<div id="logo">🔴 Marah TV</div>
<div id="clock"></div>

<!-- إطارات الرسائل والأسماء -->
<div id="nameBox1"></div>
<div id="msgBox1"></div>
<div id="nameBox2"></div>
<div id="msgBox2"></div>

<div id="gameStatus">
🚦 الاستعدَاد للجولة القادمة
</div>

<div id="countdown">
⏳ 10
</div>

<div id="targetNumber">
🎯 ？
</div>

<div id="gameWinner">
🏆 لا يوجد فائز بعد
</div>

<div id="winsBoard">
🏆 ترتيب اللاعبين
</div>

<div id="autoStatus">
🤖 الروبوت: يعمل
</div>

<button id="adminBtn">
⚙️ الإدارة
</button>

<div id="adminPanel" style="display:none;">
<button id="startRound">▶️ بدء جولة</button>
<button id="toggleBot">🤖 تشغيل/إيقاف الروبوت</button>
</div>

</div>

<script type="module">

// سكريبت سحري لتثبيت الخطوط والعناصر بنسبة 100% عند تصغير وتكبير المتصفح
function resizeGame() {
  const container = document.getElementById("mainContainer");
  if (container) {
    const currentWidth = container.offsetWidth;
    // جعل الخط متناسباً تماماً مع عرض الحاوية الفعلي لحماية العناصر من التحرك
    container.style.fontSize = (currentWidth / 420) * 16 + "px";
  }
}
window.addEventListener("resize", resizeGame);
window.addEventListener("DOMContentLoaded", resizeGame);

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
set,
remove,
get,
update
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
const firebaseConfig = {
apiKey: "AIzaSyD8yIx-iVO4kCC-92lVHAzrVB7ye6ncbes",
authDomain: "marah-tv-ed147.firebaseapp.com",
databaseURL: "https://marah-tv-ed147-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "marah-tv-ed147",
storageBucket: "marah-tv-ed147.firebasestorage.app",
messagingSenderId: "868399469455",
appId: "1:868399469455:web:15fc7d07b342574c5e71fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gameRef = ref(db,"game");
const messagesRef = ref(db,"messages");
const winsRef = ref(db,"wins");
  
let countdownStarted = false;
let countdown = 15;
setInterval(()=>{
document.getElementById("clock").textContent =
new Date().toLocaleTimeString("ar");
},1000);

onValue(messagesRef,(snapshot)=>{

const data = snapshot.val();

if(!data) return;

const sorted = Object.values(data).sort((a,b)=>b.time-a.time);

// تنظيف الكلمات العشوائية فوراً ودون ترك ثلاث نقاط تشوه المظهر
const cleanText = (txt) => {
  if (!txt) return "";
  if (txt.includes("نينيتيم") || txt.includes("بزينين") || txt.length > 30) {
    return ""; // يتم تصفير النص العشوائي تماماً لتنظيف الشاشة
  }
  return txt;
};

if(sorted[0]) {
  if(document.getElementById("nameBox1")) document.getElementById("nameBox1").textContent = sorted[0].name;
  if(document.getElementById("msgBox1")) document.getElementById("msgBox1").textContent = cleanText(sorted[0].text);
}
if(sorted[1]) {
  if(document.getElementById("nameBox2")) document.getElementById("nameBox2").textContent = sorted[1].name;
  if(document.getElementById("msgBox2")) document.getElementById("msgBox2").textContent = cleanText(sorted[1].text);
}

});
let botEnabled = true;
let gameRunning = false;

function startGame(){

if(gameRunning) return;

gameRunning = true;

let countdown = 10;

const countdownBox =
document.getElementById("countdown");

const statusBox =
document.getElementById("gameStatus");

const numberBox =
document.getElementById("targetNumber");

statusBox.textContent =
"🚦 استعدوا للجولة القادمة";

numberBox.textContent =
"🎯 جاري اختيار الرقم...";
const interval = setInterval(()=>{

countdownBox.textContent =
"⏳ " + countdown;

countdown--;

if(countdown < 0){

clearInterval(interval);

statusBox.textContent =
"🔥 انتظار الرقم من Firebase";

gameRunning = false;

}

},1000);

}
onValue(gameRef,(snapshot)=>{

const data = snapshot.val();

if(!data) return;

if(data.targetNumber){

document.getElementById("targetNumber").textContent =
"🎯 الرقم المطلوب: " + data.targetNumber;

}

if(data.winner){

document.getElementById("gameWinner").textContent =
"🏆 الفائز: " + data.winner;

if(botEnabled){

setTimeout(()=>{

startNewRound();

},5000);

}

}else{

document.getElementById("gameWinner").textContent =
"🏆 لا يوجد فائز بعد";

}
  
});

document.getElementById("toggleBot").addEventListener("click",()=>{

update(gameRef,{
botEnabled: !botEnabled
});

});
onValue(gameRef,(snapshot)=>{

const data = snapshot.val();

if(!data) return;

if(data.status === "countdown"){

document.getElementById("gameStatus").textContent =
"🚦 استعدوا للجولة القادمة";

document.getElementById("countdown").textContent =
"⏳ " + data.countdown;

document.getElementById("targetNumber").textContent =
"🎯 ؟";

}

botEnabled = data.botEnabled;

document.getElementById("autoStatus").textContent =
botEnabled ? "🤖 الروبوت: يعمل" : "⛔ الروبوت متوقف";

});
  
document.getElementById("adminBtn").addEventListener("click",()=>{

const pass = prompt("أدخل كلمة المرور");

if(pass !== "3"){
alert("كلمة المرور غير صحيحة");
return;
}

const panel =
document.getElementById("adminPanel");

if(panel.style.display === "none"){

panel.style.display = "block";

}else{

panel.style.display = "none";

}

});
document.getElementById("startRound").addEventListener("click",()=>{

update(gameRef,{
countdown: 10,
status: "countdown",
winner: ""
});

let count = 10;

const timer = setInterval(()=>{

count--;

update(gameRef,{
countdown: count
});

if(count <= 0){

clearInterval(timer);

const targetNumber =
Math.floor(Math.random() * 100) + 1;

update(gameRef,{
targetNumber: targetNumber,
status: "playing",
winner: ""
});

}

},1000);

});

function startNewRound(){

update(gameRef,{
countdown: 10,
status: "countdown",
winner: ""
});

let count = 10;

const timer = setInterval(()=>{

count--;

update(gameRef,{
countdown: count
});

if(count <= 0){

clearInterval(timer);

const targetNumber =
Math.floor(Math.random() * 100) + 1;

update(gameRef,{
targetNumber: targetNumber,
status: "playing",
winner: ""
});

}

},1000);

}

onValue(winsRef,(snapshot)=>{

const board =
document.getElementById("winsBoard");

const data = snapshot.val();

if(!data){
board.innerHTML = "🏆 ترتيب اللاعبين";
return;
}

const players =
Object.entries(data)
.sort((a,b)=>b[1].wins - a[1].wins);
const topPlayers = players.slice(0,3);
let html = "🏆 ترتيب اللاعبين<br><br>";

topPlayers.forEach(([name,info],index)=>{

let medal = "🏅";

if(index === 0) medal = "🥇";
if(index === 1) medal = "🥈";
if(index === 2) medal = "🥉";

html += medal + " " + name + " : " + info.wins + "<br>";

});

board.innerHTML = html;

});
  
resizeGame();
</script>

</body>
</html>
