<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
set,
remove,
get,
update
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
const firebaseConfig = {
apiKey: "AIzaSyD8yIx-iVO4kCC-92lVHAzrVB7ye6ncbes",
authDomain: "marah-tv-ed147.firebaseapp.com",
databaseURL: "https://marah-tv-ed147-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "marah-tv-ed147",
storageBucket: "marah-tv-ed147.firebasestorage.app",
messagingSenderId: "868399469455",
appId: "1:868399469455:web:15fc7d07b342574c5e71fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gameRef = ref(db,"game");
const messagesRef = ref(db,"messages");
const winsRef = ref(db,"wins");
  
let countdownStarted = false;
let countdown = 15;
setInterval(()=>{
document.getElementById("clock").textContent =
new Date().toLocaleTimeString("ar");
},1000);

const savedName = localStorage.getItem("marah_name");

if(savedName){
document.getElementById("name").value = savedName;
}

document.getElementById("send").addEventListener("click",()=>{

const name = document.getElementById("name").value.trim();
const text = document.getElementById("text").value.trim();

if(!name || !text) return;
  
const bannedWords = [
"كس",
"كسا",
"كسك",
"اير",
"ايري",
"يلعن",
"قحبة",
"كلمة2",
"قحب",
"كلب",
"حيوان",
"خرا",
"حمار",
"منيك",
"انيك",
"جحش",
"حمار",
"كديش",
"شرموطة",
"شرموط",
"منتاك",
"عير",
"بزاز",
"تلحس",
"ترضع",
"بوس",
"بعص",
"ابعص",
"عرصة",
"جلب",
"1234567890"
];

const lowerText = text.toLowerCase();

if(bannedWords.some(word => lowerText.includes(word.toLowerCase()))){
alert("هذه الرسالة تحتوي على كلمات غير مسموح بها");
return;
}

localStorage.setItem("marah_name",name);

if(
text.toLowerCase() !== "me" &&
text.toLowerCase() !== "leave"
){

get(gameRef).then((snapshot)=>{

const game = snapshot.val();

if(
game &&
game.targetNumber &&
text == game.targetNumber &&
!game.winner
){
console.log("الفائز هو:",name);
  
update(gameRef,{
winner:name
});

get(ref(db,"wins/" + name)).then((winSnap)=>{

let currentWins = 0;

if(winSnap.exists()){
currentWins = winSnap.val().wins || 0;
}

set(ref(db,"wins/" + name),{
wins: currentWins + 1
});

});

}

});

push(messagesRef,{
name:name,
text:text,
time:Date.now()
});
}

if(text.toLowerCase() === "me"){
set(ref(db,"players/" + name),{
name:name
});
}
  
if(text.toLowerCase() === "leave"){
remove(ref(db,"players/" + name));
}
document.getElementById("text").value="";

});

onValue(messagesRef,(snapshot)=>{

const box = document.getElementById("messages");
box.innerHTML = "";

const data = snapshot.val();

if(!data) return;

Object.values(data)
.sort((a,b)=>b.time-a.time)
.forEach(msg=>{

const div = document.createElement("div");
div.className="msg";
div.textContent = msg.name + ": " + msg.text;

box.appendChild(div);

});

});
let botEnabled = true;
let gameRunning = false;

function startGame(){

if(gameRunning) return;

gameRunning = true;

let countdown = 10;

const countdownBox =
document.getElementById("countdown");

const statusBox =
document.getElementById("gameStatus");

const numberBox =
document.getElementById("targetNumber");

statusBox.textContent =
"🚦 استعدوا للجولة القادمة";

numberBox.textContent =
"🎯 جاري اختيار الرقم...";
const interval = setInterval(()=>{

countdownBox.textContent =
"⏳ " + countdown;

countdown--;

if(countdown < 0){

clearInterval(interval);

statusBox.textContent =
"🔥 انتظار الرقم من Firebase";

gameRunning = false;

}

},1000);

}
onValue(gameRef,(snapshot)=>{

const data = snapshot.val();

if(!data) return;

if(data.targetNumber){

document.getElementById("targetNumber").textContent =
"🎯 الرقم المطلوب: " + data.targetNumber;

}

if(data.winner){

document.getElementById("gameWinner").textContent =
"🏆 الفائز: " + data.winner;

if(botEnabled){

setTimeout(()=>{

startNewRound();

},5000);

}

}else{

document.getElementById("gameWinner").textContent =
"🏆 لا يوجد فائز بعد";

}
  
});

document.getElementById("toggleBot").addEventListener("click",()=>{

update(gameRef,{
botEnabled: !botEnabled
});

});
onValue(gameRef,(snapshot)=>{

const data = snapshot.val();

if(!data) return;

if(data.status === "countdown"){

document.getElementById("gameStatus").textContent =
"🚦 استعدوا للجولة القادمة";

document.getElementById("countdown").textContent =
"⏳ " + data.countdown;

document.getElementById("targetNumber").textContent =
"🎯 ؟";

}

botEnabled = data.botEnabled;

document.getElementById("autoStatus").textContent =
botEnabled ? "🤖 الروبوت: يعمل" : "⛔ الروبوت متوقف";

});
  
document.getElementById("adminBtn").addEventListener("click",()=>{

const pass = prompt("أدخل كلمة المرور");

if(pass !== "3"){
alert("كلمة المرور غير صحيحة");
return;
}

const panel =
document.getElementById("adminPanel");

if(panel.style.display === "none"){

panel.style.display = "block";

}else{

panel.style.display = "none";

}

});
document.getElementById("startRound").addEventListener("click",()=>{

update(gameRef,{
countdown: 10,
status: "countdown",
winner: ""
});

let count = 10;

const timer = setInterval(()=>{

count--;

update(gameRef,{
countdown: count
});

if(count <= 0){

clearInterval(timer);

const targetNumber =
Math.floor(Math.random() * 100) + 1;

update(gameRef,{
targetNumber: targetNumber,
status: "playing",
winner: ""
});

}

},1000);

});

function startNewRound(){

update(gameRef,{
countdown: 10,
status: "countdown",
winner: ""
});

let count = 10;

const timer = setInterval(()=>{

count--;

update(gameRef,{
countdown: count
});

if(count <= 0){

clearInterval(timer);

const targetNumber =
Math.floor(Math.random() * 100) + 1;

update(gameRef,{
targetNumber: targetNumber,
status: "playing",
winner: ""
});

}

},1000);

}

onValue(winsRef,(snapshot)=>{

const board =
document.getElementById("winsBoard");

const data = snapshot.val();

if(!data){
board.innerHTML = "🏆 ترتيب اللاعبين";
return;
}

const players =
Object.entries(data)
.sort((a,b)=>b[1].wins - a[1].wins);
const topPlayers = players.slice(0,3);
let html = "🏆 ترتيب اللاعبين<br><br>";

topPlayers.forEach(([name,info],index)=>{

let medal = "🏅";

if(index === 0) medal = "🥇";
if(index === 1) medal = "🥈";
if(index === 2) medal = "🥉";

html += medal + " " + name + " : " + info.wins + "<br>";

});

board.innerHTML = html;

});
  
startGame();  
</script>
