<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Marah TV</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0c0f12;
  font-family: Tahoma, "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center; 
  height: 100vh;
  overflow: hidden;
  padding: 0;
}

/* حاوية اللعبة الثابتة والنسبية بالكامل بمقاس 420x740 */
.game-container {
  position: relative;
  width: 100vw;
  height: calc(100vw * (740 / 420));
  max-width: 420px; 
  max-height: 740px;
  background: url("munirmunir.jpg");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  font-size: 16px; 
}

/* شاشات الكمبيوتر: ملاءمة الطول ومنع التمرير */
@media (min-height: 740px) and (min-width: 420px) {
  .game-container {
    height: 740px;
    width: 420px;
  }
}
@media (max-height: 739px) and (min-width: 420px) {
  .game-container {
    height: 100vh;
    width: calc(100vh * (420 / 740));
  }
}

/* ========================================================
   توزيع العناصر الدقيق والمطابق تماماً للصورة "7269.png"
   ======================================================== */

#logo {
  position: absolute;
  top: 3.5%;
  left: 70.0%;
  font-size: 0.8em;
  font-weight: bold;
  display: none; /* مخفي لأن اللوجو مطبوع داخل نافذة الخلفية الجديدة */
}

#clock {
  position: absolute;
  top: 1.8%;
  left: 17.5%;
  width: 42%;
  text-align: center;
  font-size: 0.95em;
  font-weight: bold;
  color: #ffffff;
}

/* صندوق اسم منير العلوي */
#nameBox1 {
  position: absolute;
  top: 13.0%;
  left: 37.5%;
  width: 41.5%;
  height: 4.2%;
  text-align: center;
  font-weight: bold;
  font-size: 1.05em;
  color: #333;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* صندوق رسالة منير العلوية */
#msgBox1 {
  position: absolute;
  top: 17.5%;
  left: 37.5%;
  width: 41.5%;
  height: 11.5%;
  text-align: center;
  font-size: 0.95em;
  font-weight: bold;
  color: #002D62;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  white-space: normal;
  line-height: 1.3;
  padding: 2px 5px;
}

/* صندوق اسم أحمد السفلي */
#nameBox2 {
  position: absolute;
  top: 30.7%;
  left: 37.5%;
  width: 41.5%;
  height: 4.2%;
  text-align: center;
  font-weight: bold;
  font-size: 1.05em;
  color: #333;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* صندوق رسالة أحمد السفلية */
#msgBox2 {
  position: absolute;
  top: 35.2%;
  left: 37.5%;
  width: 41.5%;
  height: 11.5%;
  text-align: center;
  font-size: 0.95em;
  font-weight: bold;
  color: #002D62;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  white-space: normal;
  line-height: 1.3;
  padding: 2px 5px;
}

/* لوحة ترتيب اللاعبين (عدد مرات الفوز) جهة اليمين في الخلفية المطبوعة */
#winsBoard {
  position: absolute;
  top: 52.5%;
  left: 4.5%;
  width: 27.5%;
  height: 15.0%;
  font-size: 0.95em;
  font-weight: bold;
  color: #ffffff;
  line-height: 1.8;
  padding-right: 5px;
}

/* حالة اللعبة داخل اللوحة الزرقاء الكبيرة (GAMES) */
#gameStatus {
  position: absolute;
  top: 74.0%;
  left: 32.0%;
  width: 37.0%;
  text-align: center;
  font-size: 0.88em;
  font-weight: bold;
  color: #ffffff;
}

/* الفائز بالجولة داخل اللوحة الزرقاء الكبيرة */
#gameWinner {
  position: absolute;
  top: 77.5%;
  left: 31.0%;
  width: 38.0%;
  text-align: center;
  font-size: 1.05em;
  font-weight: bold;
  color: #ffffff;
}

/* رقم العداد التنازلي فوق الساعة الرملية على اليسار */
#countdown {
  position: absolute;
  top: 80.5%;
  left: 10.5%;
  width: 14.0%;
  text-align: center;
  font-size: 1.8em;
  font-weight: bold;
  color: #ffffff;
}

/* الرقم المطلوب فوق لوحة الهدف على اليمين */
#targetNumber {
  position: absolute;
  top: 80.5%;
  left: 75.0%;
  width: 14.0%;
  text-align: center;
  font-size: 1.8em;
  font-weight: bold;
  color: #ffffff;
}

/* عدد اللاعبين المتصلين (سمايلات) في الأسفل على اليسار */
#playersCount {
  position: absolute;
  top: 90.6%;
  left: 3.5%;
  color: #ffffff;
  font-size: 0.85em;
  font-weight: bold;
  width: 14%;
  text-align: center;
}

/* نص المشرف / الروبوت في الشريط الأسود السفلي المنتصف */
#autoStatus {
  position: absolute;
  top: 94.8%;
  left: 27.0%;
  width: 46.0%;
  text-align: center;
  font-size: 0.95em;
  font-weight: bold;
  color: #ff00ff; /* لون فوشي متناسق مع كلمة المشرف كونترول */
}

/* زر الإدارة الشفاف والمطابق لترس الإدارة */
#adminBtn {
  position: absolute;
  top: 73.0%;
  left: 69.5%;
  width: 21.0%;
  height: 4.5%;
  background: transparent;
  color: transparent; /* جعل النص شفافاً لأن كلمة الإدارة مطبوعة خلفه */
  border: none;
  cursor: pointer;
}

#adminPanel {
  position: absolute;
  top: 62.16%;
  left: 23.8%;
  width: 52.38%;
  background: rgba(0,0,0,0.9);
  padding: 2%;
  border-radius: 5px;
  z-index: 10;
  text-align: center;
}
#adminPanel button {
  width: 100%;
  margin: 2% 0;
  padding: 3%;
  font-size: 0.9em;
}
</style>

</head>

<body>

<div class="game-container" id="mainContainer">

<div id="logo">🔴 Marah TV</div>
<div id="clock"></div>

<!-- إطارات الرسائل والأسماء -->
<div id="nameBox1">منير</div>
<div id="msgBox1">جاري تحميل الرسائل...</div>
<div id="nameBox2">أحمد</div>
<div id="msgBox2">جاري تحميل الرسائل...</div>

<div id="gameStatus">🎮 لعبة الرقم السريع</div>
<div id="gameWinner">🏆 الفائز: لا أحد</div>

<div id="countdown">0</div>
<div id="targetNumber">0</div>

<div id="winsBoard">
1️⃣ منير: 0<br>
2️⃣ أحمد: 0<br>
3️⃣ محمد: 0
</div>

<div id="playersCount">0</div>
<div id="autoStatus">المشرف كونترول يعمل</div>

<button id="adminBtn">⚙️</button>

<div id="adminPanel" style="display:none;">
<button id="startRound">▶️ بدء جولة</button>
<button id="toggleBot">🤖 تشغيل/إيقاف الروبوت</button>
</div>

</div>

<script type="module">

// تثبيت الخطوط والعناصر ومنع حركتها نهائياً عند تكبير وتصغير الشاشة
function resizeGame() {
  const container = document.getElementById("mainContainer");
  if (container) {
    const currentWidth = container.offsetWidth;
    container.style.fontSize = (currentWidth / 420) * 16 + "px";
  }
}
window.addEventListener("resize", resizeGame);
window.addEventListener("DOMContentLoaded", resizeGame);

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
onValue,
update
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyD8yIx-iVO4kCC-92lVHAzrVB7ye6ncbes",
authDomain: "marah-tv-ed147.firebaseapp.com",
databaseURL: "https://marah-tv-ed147-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "marah-tv-ed147",
storageBucket: "marah-tv-ed147.firebasestorage.app",
messagingSenderId: "868399469455",
appId: "1:868399469455:web:15fc7d07b342574c5e71fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gameRef = ref(db,"game");
const messagesRef = ref(db,"messages");
const winsRef = ref(db,"wins");
  
let botEnabled = true;

setInterval(()=>{
  document.getElementById("clock").textContent = new Date().toLocaleTimeString("ar", {hour: '2-digit', minute:'2-digit', second:'2-digit'});
},1000);

onValue(messagesRef,(snapshot)=>{
const data = snapshot.val();
if(!data) return;

const sorted = Object.values(data).sort((a,b)=>b.time-a.time);

const cleanText = (txt) => {
  if (!txt) return "";
  if (txt.includes("نينيتيم") || txt.includes("بزينين") || txt.length > 40) {
    return ""; 
  }
  return txt;
};

if(sorted[0]) {
  if(document.getElementById("nameBox1")) document.getElementById("nameBox1").textContent = sorted[0].name;
  if(document.getElementById("msgBox1")) document.getElementById("msgBox1").textContent = cleanText(sorted[0].text);
}
if(sorted[1]) {
  if(document.getElementById("nameBox2")) document.getElementById("nameBox2").textContent = sorted[1].name;
  if(document.getElementById("msgBox2")) document.getElementById("msgBox2").textContent = cleanText(sorted[1].text);
}
});

onValue(gameRef,(snapshot)=>{
const data = snapshot.val();
if(!data) return;

if(data.targetNumber){
  document.getElementById("targetNumber").textContent = data.targetNumber;
}

if(data.winner){
  document.getElementById("gameWinner").textContent = "🏆 الفائز: " + data.winner;
  if(botEnabled){
    setTimeout(()=>{ startNewRound(); },5000);
  }
} else {
  document.getElementById("gameWinner").textContent = "🏆 لا يوجد فائز بعد";
}

if(data.status === "countdown"){
  document.getElementById("gameStatus").textContent = "🚦 استعدوا للجولة القادمة";
  document.getElementById("countdown").textContent = data.countdown;
  document.getElementById("targetNumber").textContent = "؟";
} else if(data.status === "playing") {
  document.getElementById("gameStatus").textContent = "🎮 لعبة الرقم السريع";
  document.getElementById("countdown").textContent = "37"; // قيمة افتراضية مطابقة للصورة أو دمجها مع الكود
}

botEnabled = data.botEnabled;
document.getElementById("autoStatus").textContent = botEnabled ? "المشرف كونترول: منير" : "المشرف كونترول: متوقف";
});

document.getElementById("adminBtn").addEventListener("click",()=>{
const pass = prompt("أدخل كلمة المرور");
if(pass !== "3"){
  alert("كلمة المرور غير صحيحة");
  return;
}
const panel = document.getElementById("adminPanel");
panel.style.display = (panel.style.display === "none") ? "block" : "none";
});

document.getElementById("startRound").addEventListener("click",()=>{
update(gameRef,{ countdown: 10, status: "countdown", winner: "" });
let count = 10;
const timer = setInterval(()=>{
  count--;
  update(gameRef,{ countdown: count });
  if(count <= 0){
    clearInterval(timer);
    const targetNumber = Math.floor(Math.random() * 100) + 1;
    update(gameRef,{ targetNumber: targetNumber, status: "playing", winner: "" });
  }
},1000);
});

function startNewRound(){
update(gameRef,{ countdown: 10, status: "countdown", winner: "" });
let count = 10;
const timer = setInterval(()=>{
  count--;
  update(gameRef,{ countdown: count });
  if(count <= 0){
    clearInterval(timer);
    const targetNumber = Math.floor(Math.random() * 100) + 1;
    update(gameRef,{ targetNumber: targetNumber, status: "playing", winner: "" });
  }
},1000);
}

onValue(winsRef,(snapshot)=>{
const board = document.getElementById("winsBoard");
const data = snapshot.val();
if(!data){
  board.innerHTML = "1️⃣ منير : 0<br>2️⃣ أحمد : 0<br>3️⃣ محمد : 0";
  return;
}
const players = Object.entries(data).sort((a,b)=>b[1].wins - a[1].wins);
const topPlayers = players.slice(0,3);
let html = "";
topPlayers.forEach(([name,info],index)=>{
  let num = (index === 0) ? "1️⃣" : (index === 1) ? "2️⃣" : "3️⃣";
  html += num + " " + name + " " + info.wins + "<br>";
});
board.innerHTML = html;
});
  
resizeGame();
</script>

</body>
</html>
