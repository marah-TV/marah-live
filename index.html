<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marah TV</title>

<style>
body{
margin:0;
background:#0f172a;
color:white;
font-family:Tahoma,sans-serif;
}

header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
}

.wrap{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}

#messages{
max-height:400px;
overflow:auto;
}

.msg{
padding:8px;
border-bottom:1px solid #334155;
}
</style>
</head>

<body>

<header>
<div>🔴 Marah TV</div>
<div id="clock"></div>
</header>

<div class="wrap">

<div class="card">
<h3>الرسائل المباشرة</h3>

<input id="name" placeholder="اسمك">
<input id="text" placeholder="اكتب رسالة">

<button id="send">إرسال</button>

<div id="messages"></div>
</div>

</div>

<script>
setInterval(()=>{
document.getElementById("clock").textContent=
new Date().toLocaleTimeString("ar");
},1000);

const saved = localStorage.getItem("marah_name");

if(saved){
document.getElementById("name").value=saved;
}

document.getElementById("send").onclick=()=>{

const name=document.getElementById("name").value.trim();
const text=document.getElementById("text").value.trim();

if(!name || !text) return;

localStorage.setItem("marah_name",name);

const div=document.createElement("div");
div.className="msg";
div.textContent=name + ": " + text;

document.getElementById("messages").prepend(div);

document.getElementById("text").value="";
};
</script>

</body>
</html>
