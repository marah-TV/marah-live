* {
  margin: 0;

  box-sizing: border-box;
}

body {
  background: #0c0f12;
  font-family: Tahoma, "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start; 
  height: 100vh;
  overflow: hidden; /* يمنع ظهور أي شريط تمرير نهائياً في البث */
  padding: 0;
}

/* حاوية اللعبة الذكية للبث المباشر */
.game-container {
  position: relative;
  /* الميزة السحرية: تجعل اللعبة تتناسب مع الارتفاع في الكمبيوتر ومع العرض في الموبايل */
  width: min(100vw, calc(100vh * (420 / 740)));
  height: min(100vh, calc(100vw * (740 / 420)));
  max-width: 420px; 
  max-height: 740px;
  background: url("munirmunir.jpg");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  margin-top: 0;
}
