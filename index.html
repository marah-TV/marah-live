<!DOCTYPE html>

<title>Marah TV</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0c0f12;
  font-family: Tahoma, "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center; 
  height: 100vh;
  overflow: hidden;
  padding: 0;
}

/* حاوية اللعبة الثابتة والنسبية بالكامل بمقاس 420x740 */
.game-container {
  position: relative;
  width: 100vw;
  height: calc(100vw * (740 / 420));
  max-width: 420px; 
  max-height: 740px;
  background: url("munirmunir.jpg");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  font-size: 16px; 
}

/* شاشات الكمبيوتر: ملاءمة الطول ومنع التمرير */
@media (min-height: 740px) and (min-width: 420px) {
  .game-container {
    height: 740px;
    width: 420px;
  }
}
@media (max-height: 739px) and (min-width: 420px) {
  .game-container {
    height: 100vh;
    width: calc(100vh * (420 / 740));
  }
}
