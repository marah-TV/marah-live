<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Marah TV</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0c0f12;
  font-family: Tahoma, "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center; 
  height: 100vh;
  overflow: hidden;
  padding: 0;
}

.game-container {
  position: relative;
  width: 100vw;
  height: calc(100vw * (740 / 420));
  max-width: 420px; 
  max-height: 740px;
  background: url("munirmunir.jpg");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  font-size: 16px; 
}

@media (min-height: 740px) and (min-width: 420px) {
  .game-container {
    height: 740px;
    width: 420px;
  }
}
@media (max-height: 739px) and (min-width: 420px) {
  .game-container {
    height: 100vh;
    width: calc(100vh * (420 / 740));
  }
}

#clock {
  position: absolute;
  top: 1.8%;
  left: 17.5%;
  width: 42%;
  text-align: center;
  font-size: 0.95em;
  font-weight: bold;
  color: #ffffff;
}

#marahTvText {
  position: absolute;
  top: 1.5%;
  left: 54%;
  width: 40%;
  height: 10%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-weight: 900;
  font-size: 1.7em;
  color: #000000;
  text-align: center;
  line-height: 0.95;
  z-index: 5;
  pointer-events: none;
}
#marahTvText span {
  color: red;
  font-size: 0.8em;
  display: inline-block;
  margin-left: -5px;
}

#topControlButtons {
  position: absolute;
  top: 6.5%;
  left: 2%;
  width: 45%;
  display: flex;
  flex-direction: column;
  gap: 2px;
  z-index: 15;
}
#topControlButtons button {
  background: transparent;
  border: none;
  color: #ffffff;
  font-size: 0.72em;
  font-weight: bold;
  text-align: right;
  cursor: pointer;
  text-shadow: 1px 1px 2px #000;
}

#nameBox1 {
  position: absolute;
  top: 13.0%;
  left: 37.5%;
  width: 41.5%;
  height: 4.2%;
  text-align: center;
  font-weight: bold;
  font-size: 1.05em;
  color: #333;
  display: flex;
  justify-content: center;
  align-items: center;
}

#msgBox1 {
  position: absolute;
  top: 17.5%;
  left: 37.5%;
  width: 41.5%;
  height: 11.5%;
  text-align: center;
  font-size: 0.95em;
  font-weight: bold;
  color: #002D62;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  white-space: normal;
  line-height: 1.3;
  padding: 2px 5px;
}

#nameBox2 {
  position: absolute;
  top: 30.7%;
  left: 37.5%;
  width: 41.5%;
  height: 4.2%;
  text-align: center;
  font-weight: bold;
  font-size: 1.05em;
  color: #333;
  display: flex;
  justify-content: center;
  align-items: center;
}

#msgBox2 {
  position: absolute;
  top: 35.2%;
  left: 37.5%;
  width: 41.5%;
  height: 11.5%;
  text-align: center;
  font-size: 0.95em;
  font-weight: bold;
  color: #002D62;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  white-space: normal;
  line-height: 1.3;
  padding: 2px 5px;
}

/* تعديل إحداثيات لوحة الترتيب لتناسب البرواز الذهبي تماماً */
#winsBoard {
  position: absolute;
  top: 52.8%;
  left: 4.0%;
  width: 27.5%;
  height: 14.2%;
  font-size: 0.85em;
  font-weight: bold;
  color: #5d3a1a; /* لون بني داكن متناسق مع البرواز أو يمكنك إبقاؤه أبيض */
  color: #ffffff;
  line-height: 1.8;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  text-shadow: 1px 1px 1px rgba(0,0,0,0.6);
}

#gameStatus {
  position: absolute;
  top: 71.5%;
  left: 32.0%;
  width: 37.0%;
  text-align: center;
  font-size: 0.82em;
  font-weight: bold;
  color: #ffffff;
}

#gameWinner {
  position: absolute;
  top: 74.8%;
  left: 31.0%;
  width: 38.0%;
  text-align: center;
  font-size: 0.95em;
  font-weight: bold;
  color: #ffffff;
}

#countdownContainer {
  position: absolute;
  top: 71.5%;
  left: 10.5%;
  width: 14.0%;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#countdownContainer .emoji {
  font-size: 1.2em;
}
#countdown {
  font-size: 1.6em;
  font-weight: bold;
  color: #ffffff;
  margin-top: -4px;
}

#targetContainer {
  position: absolute;
  top: 71.5%;
  left: 75.0%;
  width: 14.0%;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#targetContainer .emoji {
  font-size: 1.2em;
}
#targetNumber {
  font-size: 1.6em;
  font-weight: bold;
  color: #ffffff;
  margin-top: -4px;
}

#playersCount {
  position: absolute;
  top: 83.5%;
  left: 3.5%;
  color: #ffffff;
  font-size: 0.8em;
  font-weight: bold;
  width: 14%;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#playersCount span {
  font-size: 1.4em;
  margin-bottom: -3px;
}

#autoStatus {
  position: absolute;
  top: 94.8%;
  left: 27.0%;
  width: 46.0%;
  text-align: center;
  font-size: 0.95em;
  font-weight: bold;
  color: #ff00ff;
}

/* نقل زر الإدارة وتعديل مكانه ليكون أسفل اليمين تماماً فوق العجلة السوداء المضيئة */
#adminBtn {
  position: absolute;
  top: 85.5%;
  right: 28.0%;
  width: 44.0%;
  height: 6.5%;
  background: transparent;
  color: transparent;
  border: none;
  cursor: pointer;
  z-index: 20;
}

#adminPanel {
  position: absolute;
  bottom: 16%;
  right: 5%;
  width: 50%;
  background: rgba(0, 0, 0, 0.9);
  border: 2px solid #ff00ff;
  padding: 8px;
  border-radius: 6px;
  z-index: 100;
  text-align: center;
}
#adminPanel button {
  width: 100%;
  margin: 4px 0;
  padding: 6px;
  font-size: 0.8em;
  font-weight: bold;
  cursor: pointer;
  background: #222;
  color: #fff;
  border: 1px solid #aaa;
}
</style>

</head>

<body>

<div class="game-container" id="mainContainer">

<div id="clock"></div>

<div id="marahTvText">marah<br>TV<span>🔴</span></div>

<div id="topControlButtons">
  <button id="fastBotBtn">🤖 تشغيل/إيقاف الروبوت</button>
  <button id="fastStartBtn">▶️ بدء الجولة</button>
</div>

<div id="nameBox1">منير</div>
<div id="msgBox1">جاري التحميل...</div>
<div id="nameBox2">أحمد</div>
<div id="msgBox2">جاري التحميل...</div>

<div id="gameStatus">🎮 لعبة الرقم السريع</div>
<div id="gameWinner">🏆 لا يوجد فائز بعد</div>

<div id="countdownContainer">
  <div class="emoji">⏳</div>
  <div id="countdown">--</div>
</div>

<div id="targetContainer">
  <div class="emoji">🎯</div>
  <div id="targetNumber">؟</div>
</div>

<!-- لوحة الترتيب داخل البرواز الذهبي المخصص لها -->
<div id="winsBoard">
  جاري التحميل...
</div>

<div id="playersCount">
  <span>🤪</span>
  <small id="pCountText">سمايلات</small>
</div>

<div id="autoStatus">المشرف كونترول منير</div>

<!-- زر الإدارة الشفاف موضوع الآن أسفل اليمين في المكان المخصص -->
<button id="adminBtn">⚙️</button>

<div id="adminPanel" style="display:none;">
<button id="startRound">▶️ بدء جولة</button>
<button id="toggleBot">🤖 تشغيل/إيقاف الروبوت</button>
</div>

</div>

<script type="module">

function resizeGame() {
  const container = document.getElementById("mainContainer");
  if (container) {
    const currentWidth = container.offsetWidth;
    container.style.fontSize = (currentWidth / 420) * 16 + "px";
  }
}
window.addEventListener("resize", resizeGame);
window.addEventListener("DOMContentLoaded", resizeGame);

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
onValue,
update
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyD8yIx-iVO4kCC-92lVHAzrVB7ye6ncbes",
authDomain: "marah-tv-ed147.firebaseapp.com",
databaseURL: "https://marah-tv-ed147-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "marah-tv-ed147",
storageBucket: "marah-tv-ed147.firebasestorage.app",
messagingSenderId: "868399469455",
appId: "1:868399469455:web:15fc7d07b342574c5e71fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gameRef = ref(db,"game");
const messagesRef = ref(db["messages"]);
const winsRef = ref(db,"wins");
  
let botEnabled = true;

setInterval(()=>{
  const clk = document.getElementById("clock");
  if(clk) clk.textContent = new Date().toLocaleTimeString("ar", {hour: '2-digit', minute:'2-digit', second:'2-digit'});
},1000);

onValue(messagesRef,(snapshot)=>{
const data = snapshot.val();
if(!data) return;

const sorted = Object.values(data).sort((a,b)=>b.time-a.time);

const cleanText = (txt) => {
  if (!txt) return "";
  if (txt.includes("نينيتيم") || txt.includes("بزينين") || txt.length > 40) {
    return ""; 
  }
  return txt;
};

if(sorted[0]) {
  if(document.getElementById("nameBox1")) document.getElementById("nameBox1").textContent = sorted[0].name;
  if(document.getElementById("msgBox1")) document.getElementById("msgBox1").textContent = cleanText(sorted[0].text);
}
if(sorted[1]) {
  if(document.getElementById("nameBox2")) document.getElementById("nameBox2").textContent = sorted[1].name;
  if(document.getElementById("msgBox2")) document.getElementById("msgBox2").textContent = cleanText(sorted[1].text);
}
});

onValue(gameRef,(snapshot)=>{
const data = snapshot.val();
if(!data) return;

if(data.countdown !== undefined){
  const countEl = document.getElementById("countdown");
  if(countEl) countEl.textContent = data.countdown;
}

if(data.status === "countdown"){
  if(document.getElementById("gameStatus")) document.getElementById("gameStatus").textContent = "🚦 استعدوا للجولة القادمة";
  if(document.getElementById("targetNumber")) document.getElementById("targetNumber").textContent = "؟";
} else if(data.status === "playing") {
  if(document.getElementById("gameStatus")) document.getElementById("gameStatus").textContent = "🎮 لعبة الرقم السريع";
  if(data.targetNumber && document.getElementById("targetNumber")){
    document.getElementById("targetNumber").textContent = data.targetNumber;
  }
}

if(data.winner){
  const gWin = document.getElementById("gameWinner");
  if(gWin) gWin.textContent = "🏆 الفائز: " + data.winner;
} else {
  const gWin = document.getElementById("gameWinner");
  if(gWin) gWin.textContent = "🏆 لا يوجد فائز بعد";
}

botEnabled = data.botEnabled;
if(document.getElementById("autoStatus")) {
  document.getElementById("autoStatus").textContent = botEnabled ? "المشرف كونترول: منير" : "المشرف كونترول: متوقف";
}
});

const adminBtn = document.getElementById("adminBtn");
if(adminBtn){
  adminBtn.addEventListener("click",()=>{
    const pass = prompt("أدخل كلمة المرور");
    if(pass !== "3"){
      alert("كلمة المرور غير صحيحة");
      return;
    }
    const panel = document.getElementById("adminPanel");
    if(panel) panel.style.display = (panel.style.display === "none") ? "block" : "none";
  });
}

const triggerStartRound = ()=>{
  update(gameRef,{ countdown: 10, status: "countdown", winner: "" });
};

const toggleBotAction = ()=>{
  botEnabled = !botEnabled;
  update(gameRef, { botEnabled: botEnabled });
};

try {
  if(document.getElementById("startRound")) document.getElementById("startRound").addEventListener("click", triggerStartRound);
  if(document.getElementById("fastStartBtn")) document.getElementById("fastStartBtn").addEventListener("click", triggerStartRound);
  if(document.getElementById("toggleBot")) document.getElementById("toggleBot").addEventListener("click", toggleBotAction);
  if(document.getElementById("fastBotBtn")) document.getElementById("fastBotBtn").addEventListener("click", toggleBotAction);
} catch(e) {
  console.log("Buttons registration log:", e);
}

onValue(winsRef,(snapshot)=>{
const board = document.getElementById("winsBoard");
if(!board) return;
const data = snapshot.val();
if(!data){
  board.innerHTML = "🥇 منير 0<br>🥈 أحمد 0<br>🥉 محمد 0";
  return;
}
const players = Object.entries(data).sort((a,b)=>b[1].wins - a[1].wins);
const topPlayers = players.slice(0,3);
let html = "";
topPlayers.forEach(([name,info],index)=>{
  let num = (index === 0) ? "🥇" : (index === 1) ? "🥈" : "🥉";
  html += num + " " + name + " " + info.wins + "<br>";
});
board.innerHTML = html;
});
  
resizeGame();
</script>

</body>
</html>
