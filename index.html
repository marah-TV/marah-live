<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marah TV - Dual View</title>
<style>
    body { background: #0c0f12; display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 0; padding: 10px; }
    
    .game-container {
        position: relative;
        width: 420px;
        height: 740px;
        background: url("munirmunir.jpg");
        background-size: 100% 100%;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* تحويل كل الـ ID في كودك الأصلي إلى كلاسات هنا */
    .logo { position: absolute; top: 3.35%; right: 13%; font-size: 1em; font-weight: bold; background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff, #ff0000); background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbowMove 6s linear infinite; }
    .clock { position: absolute; top: 8.08%; left: 68.0%; color: gold; font-weight: bold; }
    .playersCount { position: absolute; top: 26%; left: -6%; color: gold; font-weight: bold; }
    .gameChat { position: absolute; top: 50%; left: 32.5%; width: 40%; height: 20%; color: white; font-size: 0.75em; background: rgba(0,0,0,0.5); overflow: hidden; }
    
    /* ملاحظة: قم بنسخ باقي تنسيقات الـ CSS الخاصة بك هنا مع استبدال # بـ . لكل العناصر */
</style>
</head>
<body>

<div class="game-container" id="screen1">
    <div class="logo">🔴 Marah TV</div>
    <div class="clock">00:00:00</div>
    <div class="playersCount">👥 0</div>
    <div class="gameChat">دردشة اللعبة...</div>
</div>

<div class="game-container" id="screen2">
    <div class="logo">🔴 Marah TV</div>
    <div class="clock">00:00:00</div>
    <div class="playersCount">👥 0</div>
    <div class="gameChat">دردشة اللعبة...</div>
</div>

<script type="module">
    // عند تحديث أي بيانات من Firebase، نقوم بتحديثها في الشاشتين معاً
    function updateDisplay(className, value) {
        const elements = document.querySelectorAll('.' + className);
        elements.forEach(el => el.textContent = value);
    }

    // مثال على كيفية الربط مع Firebase:
    // بدلاً من document.getElementById("clock").textContent = ...
    // استخدم الدالة المحدثة:
    // updateDisplay('clock', new Date().toLocaleTimeString("ar"));
    
    // استمر في استخدام هذا المنطق في باقي كود الـ Firebase الخاص بك
</script>

</body>
</html>
