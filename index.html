<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Marah TV</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0c0f12;
  font-family: Tahoma, "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  padding: 0;
}

.game-container {
  position: relative;
  width: 100vw;
  height: calc(100vw * (740 / 420));
  max-width: 420px;
  max-height: 740px;
  background: url("munirmunir.jpg");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  font-size: 16px;
}

@media (min-height: 740px) and (min-width: 420px) {
 .game-container {
    height: 740px;
    width: 420px;
  }
}
@media (max-height: 739px) and (min-width: 420px) {
 .game-container {
    height: 100vh;
    width: calc(100vh * (420 / 740));
  }
}

#logo {
  position: absolute;
  top: 3.35%;
  right: 13%;
  display:inline-block;
  font-size: 1em;
  font-weight: bold;
  overflow: visible;
  isolation: isolate;
  background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff, #ff0000);
  background-size: 400% 400%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rainbowMove 6s linear infinite, royalSpin 15s ease-in-out infinite;
  text-shadow: 0 0 10px rgba(255,215,0,.8), 0 0 20px rgba(255,215,0,.6), 0 0 40px rgba(255,215,0,.4);
}

#clock {
  position: absolute;
  top: 8.08%;
  left: 68.0%;
  font-size: 0.8em;
  font-weight: bold;
  color: gold;
  text-shadow: 0px 0px 3px black, 0px 0px 6px black;
}

#nameBox1, #nameBox2 {
  position: absolute;
  left: 44.0%;
  width: 33.33%;
  height: 4.73%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 0.80em;
  font-weight: 600;
  color: #b100ff;
  text-shadow: 1px 1px 0 #FFD700, -1px 1px 0 #FFD700, 1px -1px 0 #FFD700, -1px -1px 0 #FFD700, 0 0 4px #FFD700, 0 0 8px #FFD700, 0 0 2px #b100ff, 0 0 6px #b100ff, 0 0 12px #b100ff, 0 0 20px #b100ff;
  letter-spacing: 1px;
}
#nameBox1 { top: 12.0%; }
#nameBox2 { top: 30.0%; }

#msgBox1, #msgBox2 {
  position: absolute;
  left: 30.0%;
  width: 50.38%;
  height: 15.11%;
  text-align: center;
  font-size: 0.95em;
  display: block;
  white-space: normal;
  word-break: break-word;
  overflow-wrap: break-word;
  line-height: 1.25;
  padding: 6px;
  overflow: auto;
  color: #000000;
  font-weight: 600;
  text-shadow: 0px 0px 2px #ffffff, 0px 0px 4px #ffffff;
}
#msgBox1 { top: 16.0%; border: 3px solid red; background: rgba(255,0,0,0.20); }
#msgBox2 { top: 34.0%; border: 3px solid lime; background: rgba(0,255,0,0.20); }

#winsBoard {
  position: absolute;
  top: 47.1%;
  left: -5.0%;
  width: 33%;
  font-size: 0.85em;
  line-height: 1.4;
}

#gameStatus, #gameWinner {
  position: absolute;
  text-align: center;
  font-size: 1.2em;
  color: gold;
  font-weight: bold;
  text-shadow: 0px 0px 3px black, 0px 0px 6px black;
}
#gameStatus { top: 73.0%; left: 28.8%; width: 52.38%; }
#gameWinner { top: 82.0%; left: 30.0%; width: 50%; }

#countdown, #targetNumber {
  position: absolute;
  top: 77.0%;
  font-size: 1.5em;
  color: gold;
  font-weight: bold;
  text-shadow: 0px 0px 3px black, 0px 0px 6px black;
}
#countdown { left: 11.0%; }
#targetNumber { left: 43.0%; }

#playersCount {
  position: absolute;
  top: 26%;
  left: -6%;
  width: 30%;
  font-size: 0.9em;
  font-weight: bold;
  text-align: right;
  color: gold;
  text-shadow: 0px 0px 3px black, 0px 0px 6px black;
}

#adminBtn {
  position: absolute;
  top: 90.0%;
  left: 75.9%;
  width: 23.8%;
  height: 5.4%;
  background: transparent;
  font-size: 1em;
  border: none;
  cursor: pointer;
  text-align: center;
  color: gold;
  font-weight: bold;
  text-shadow: 0px 0px 3px black, 0px 0px 6px black;
}

#autoStatus {
  position: absolute;
  top: 90.0%;
  left: 1.0%;
  font-size: 0.9em;
  color: gold;
  font-weight: bold;
  text-shadow: 0px 0px 3px black, 0px 0px 6px black;
}

#adminPanel {
  position: absolute;
  top: 10%;
  left: -1%;
  width: 90%;
  background: rgba(0,0,0,0.95);
  padding: 10px;
  border-radius: 8px;
  z-index: 9999;
  text-align: center;
  display: none;
}
#adminPanel button {
  display: block;
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  font-size: 0.9em;
}

#designGrid{
  position:absolute;
  inset:0;
  z-index:100;
  pointer-events:none;
}

#designGrid::before{
  content:"";
  position:absolute;
  inset:0;
  background-image: linear-gradient(to right, rgba(255,255,255,0.25) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.25) 1px, transparent 1px);
  background-size:10% 10%;
}

.topLabels span{
  position:absolute;
  top:0;
  color: gold;
  font-size:12px;
  font-weight:bold;
  text-shadow: 0px 0px 3px black, 0px 0px 6px black;
}

.sideLabels span{
  position:absolute;
  left:0;
  color: gold;
  font-size:12px;
  font-weight:bold;
  text-shadow: 0px 0px 3px black, 0px 0px 6px black;
}

#playersList, #gameChat {
  position:absolute;
  overflow:auto;
  color:#fff8dc;
  font-size:0.75em;
  line-height:1.6;
  background:rgba(120,80,0,0.25);
  border:2px solid #b8860b;
  border-radius:12px;
  padding:6px;
  box-shadow: 0 0 8px rgba(255,215,0,0.4), inset 0 0 6px rgba(255,215,0,0.2);
  color: black;
  font-weight: bold;
  text-shadow: 0px 0px 3px white, 0px 0px 6px white;
  z-index: 1000;
}
#playersList { top:30%; left:5%; width:20%; height:15%; }
#gameChat { top:50%; left:32.50%; width:40%; height:20%; }

#lastJoined, #lastWinner, #roundCount, #gameMode {
  position:absolute;
  color: black;
  font-weight: bold;
  text-shadow: 0px 0px 3px white, 0px 0px 6px white;
}
#lastJoined { top:63%; left:60%; width:35%; font-size:0.75em; }
#lastWinner { top:68%; left:65%; width:50%; text-align:center; font-size:0.8em; }
#roundCount { top:58%; left:83%; font-size:0.8em; }
#gameMode { top:52%; left:77%; font-size:0.8em; }

#ownerBanner{
  position:absolute;
  bottom:2.5%;
  left:15%;
  width:70%;
  height:4%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:gold;
  font-size:1em;
  font-weight:bold;
  background:rgba(0,0,0,0.55);
  border:2px solid gold;
  border-radius:30px;
  text-shadow: 0 0 5px gold, 0 0 10px gold;
  animation: glowBanner 2s infinite alternate, fadeBanner 4s infinite;
}

@keyframes glowBanner{ from{box-shadow:0 0 5px gold;} to{box-shadow:0 0 10px gold, 0 0 20px gold, 0 0 30px orange;} }
@keyframes rainbowMove{ 0%{background-position:0% 50%;} 100%{background-position:400% 50%;} }
@keyframes royalSpin{ 0%{transform:rotate(0deg) scale(1);} 45%{transform:rotate(0deg) scale(1);} 50%{transform:rotate(360deg) scale(1.15);} 55%{transform:rotate(360deg) scale(1);} 100%{transform:rotate(360deg) scale(1);} }

#logo::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:120%;
  height:120%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background: radial-gradient(circle, rgba(255,215,0,.35) 0%, rgba(255,255,255,.15) 30%, transparent 70%);
  filter:blur(10px);
  z-index:-1;
  animation:sunAura 4s infinite alternate;
}

#logo::after{
  content:"💥";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) scale(0);
  opacity:0;
  font-size:2.5em;
  pointer-events:none;
  animation:fireworks 15s infinite;
}

@keyframes sunAura{ from{transform:translate(-50%,-50%) scale(1); opacity:.5;} to{transform:translate(-50%,-50%) scale(1.25); opacity:1;} }
@keyframes fireworks{ 0%,48%{opacity:0; transform:translate(-50%,-50%) scale(0);} 50%{opacity:1; transform:translate(-50%,-50%) scale(1.2);} 52%{opacity:1; transform:translate(-50%,-50%) scale(2);} 58%{opacity:0; transform:translate(-50%,-50%) scale(3);} 100%{opacity:0;} }
@keyframes fadeBanner{ 0%{opacity:1;} 50%{opacity:0.35;} 100%{opacity:1;} }
</style>
</head>

<body>
<div class="game-container" id="mainContainer">
<div id="designGrid">
  <div class="topLabels">
    <span style="left:0%">0</span><span style="left:10%">10</span><span style="left:20%">20</span><span style="left:30%">30</span><span style="left:40%">40</span><span style="left:50%">50</span><span style="left:60%">60</span><span style="left:70%">70</span><span style="left:80%">80</span><span style="left:90%">90</span><span style="left:98%">100</span>
  </div>
  <div class="sideLabels">
    <span style="top:0%">0</span><span style="top:10%">10</span><span style="top:20%">20</span><span style="top:30%">30</span><span style="top:40%">40</span><span style="top:50%">50</span><span style="top:60%">60</span><span style="top:70%">70</span><span style="top:80%">80</span><span style="top:90%">90</span><span style="top:98%">100</span>
  </div>
<div id="playersList">👥 المشاركون</div>
<div id="lastJoined">آخر من انضم: -</div>
</div>

<div id="logo">🔴 Marah TV</div>
<div id="clock"></div>
<div id="nameBox1"></div>
<div id="msgBox1"></div>
<div id="nameBox2"></div>
<div id="msgBox2"></div>
<div id="gameStatus">🚦 الاستعدَاد للجولة القادمة</div>
<div id="countdown">⏳ 10</div>
<div id="roundCount">🎮 الجولة 1</div>
<div id="targetNumber">🎯الرقم الجديد بعد👈</div>
<div id="gameChat">🎮 دردشة اللعبة</div>
<div id="gameMode">🟢 انتظار اللاعبين</div>
<div id="gameWinner">🏆 لا يوجد فائز بعد</div>
<div id="lastWinner">آخر فائز: -</div>
<div id="winsBoard">🏆 ترتيب اللاعبين</div>
<div id="autoStatus">🤖 الروبوت: يعمل</div>
<div id="playersCount">👥 0</div>
<div id="ownerBanner">👑 المشرف كونترول منير 👑</div>
<button id="adminBtn">⚙️ الإدارة</button>
<div id="adminPanel">
<button id="startRound">▶️ بدء جولة</button>
<button id="toggleBot">🤖 تشغيل/إيقاف الروبوت</button>
</div>
</div>

<script type="module">
function resizeGame() {
  const container = document.getElementById("mainContainer");
  if (container) {
    const currentWidth = container.offsetWidth;
    container.style.fontSize = (currentWidth / 420) * 16 + "px";
  }
}
window.addEventListener("resize", resizeGame);
window.addEventListener("DOMContentLoaded", resizeGame);

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get, update } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyD8yIx-iVO4kCC-92lVHAzrVB7ye6ncbes",
authDomain: "marah-tv-ed147.firebaseapp.com",
databaseURL: "https://marah-tv-ed147-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "marah-tv-ed147",
storageBucket: "marah-tv-ed147.firebasestorage.app",
messagingSenderId: "868399469455",
appId: "1:868399469455:web:15fc7d07b342574c5e71fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gameRef = ref(db,"game");
const messagesRef = ref(db,"messages");
const winsRef = ref(db,"wins");
const playersRef = ref(db,"players");
const gamePlayersRef = ref(db,"gamePlayers");

let currentRound = 1;
let botEnabled = true;
let gameRunning = false;
let countdownInterval = null;
let normalMessages = [];
let lastShown = [];

// تسجيل اللاعب تلقائياً أول ما يفتح الصفحة - حل مشكلة الانضمام
let myName = localStorage.getItem("playerName");
if(!myName){
  myName = prompt("اكتب اسمك للدخول في اللعبة") || "لاعب" + Math.floor(Math.random()*1000);
  localStorage.setItem("playerName", myName);
}

async function joinGame(){
  const playerRef = ref(db,"players/" + myName);
  const gamePlayerRef = ref(db,"gamePlayers/" + myName);
  await set(playerRef, {joined:true, joinedAt:Date.now(), name:myName});
  await set(gamePlayerRef, {joined:true, joinedAt:Date.now(), name:myName});
}
joinGame();

// تنظيف الـ interval عند الخروج
window.addEventListener('beforeunload', () => {
  if(countdownInterval) clearInterval(countdownInterval);
});

setInterval(()=>{
  document.getElementById("clock").textContent = new Date().toLocaleTimeString("ar");
},1000);

function cleanText(txt){
  if(!txt) return "";
  if(/^\d+$/.test(txt)) return "";
  return txt.substring(0,120);
}

// مستمع واحد فقط لـ gameRef بدل 3
onValue(gameRef,(snapshot)=>{
  const data = snapshot.val();
  if(!data) return;

  if(data.round && data.round!== currentRound){
    currentRound = data.round;
    document.getElementById("roundCount").textContent = "🎮 الجولة " + currentRound;
  }

  if(data.targetNumber){
    document.getElementById("targetNumber").textContent = "🎯 الرقم المطلوب: " + data.targetNumber;
  }

  if(data.status === "countdown"){
    document.getElementById("gameStatus").textContent = "🚦 استعدوا للجولة القادمة";
    document.getElementById("countdown").textContent = "⏳ " + (data.countdown || 10);
    document.getElementById("targetNumber").textContent = "🎯الرقم الجديد بعد👈";
  }

  if(data.winner){
    document.getElementById("gameWinner").textContent = "🏆 الفائز: " + data.winner;
    document.getElementById("lastWinner").textContent = "آخر فائز: " + data.winner;
    if(botEnabled){
      setTimeout(() => startNewRound(), 5000);
    }
  } else {
    document.getElementById("gameWinner").textContent = "🏆 لا يوجد فائز بعد";
  }

  botEnabled = data.botEnabled!== undefined? data.botEnabled : true;
  document.getElementById("autoStatus").textContent = botEnabled? "🤖 الروبوت: يعمل" : "⛔ الروبوت متوقف";
});

onValue(messagesRef,(snapshot)=>{
  const data = snapshot.val();
  if(!data) return;

  const allMessages = Object.values(data).sort((a,b)=>b.time-a.time);

  // عرض آخر 10 أرقام بالشات
  const gameChat = document.getElementById("gameChat");
  let html = "🎮 دردشة اللعبة<br>";
  const numbersOnly = allMessages.filter(msg => /^\d+$/.test(msg.text)).slice(0,10);
  numbersOnly.forEach(msg=>{
    html += "🎯 " + msg.name + " : " + msg.text + "<br>";

    // فحص الفوز - مقارنة رقمية عشان 05 = 5
    const target = document.getElementById("targetNumber").textContent.replace(/\D/g,'');
    if(target && parseInt(msg.text) === parseInt(target)){
      update(gameRef, {winner: msg.name});
    }
  });
  gameChat.innerHTML = html;

  // رسائل الدردشة العلوية
  normalMessages = allMessages.filter(msg =>!/^\d+$/.test(msg.text) && msg.text && msg.text.length > 1).slice(0,100).reverse();
});

setInterval(()=>{
  if(normalMessages.length < 2) return;
  let availableMessages = normalMessages.filter(msg =>!lastShown.includes(msg.name + msg.text));
  if(availableMessages.length < 2){ lastShown = []; availableMessages = [...normalMessages]; }
  const msg1 = availableMessages[0];
  const msg2 = availableMessages[1];
  lastShown.push(msg1.name + msg1.text);
  lastShown.push(msg2.name + msg2.text);
  if(lastShown.length > 20){ lastShown = lastShown.slice(-20); }
  document.getElementById("nameBox1").textContent = msg1.name || "";
  document.getElementById("msgBox1").textContent = cleanText(msg1.text);
  document.getElementById("nameBox2").textContent = msg2.name || "";
  document.getElementById("msgBox2").textContent = cleanText(msg2.text);
},5000);

function startNewRound(){
  currentRound++;
  update(gameRef, {countdown: 10, status: "countdown", winner: "", round: currentRound});

  let count = 10;
  if(countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(()=>{
    count--;
    update(gameRef, {countdown: count});
    if(count <= 0){
      clearInterval(countdownInterval);
      const targetNumber = Math.floor(Math.random() * 100) + 1;
      update(gameRef, {targetNumber: targetNumber, status: "playing", winner: ""});
    }
  },1000);
}

document.getElementById("startRound").addEventListener("click",()=>{
  startNewRound();
});

document.getElementById("toggleBot").addEventListener("click",()=>{
  update(gameRef, {botEnabled:!botEnabled});
});

document.getElementById("adminBtn").addEventListener("click",()=>{
  const pass = prompt("أدخل كلمة المرور");
  if(pass!== "3"){ alert("كلمة المرور غير صحيحة"); return; }
  const panel = document.getElementById("adminPanel");
  panel.style.display = panel.style.display === "none"? "block" : "none";
});

onValue(winsRef,(snapshot)=>{
  const board = document.getElementById("winsBoard");
  const data = snapshot.val();
  if(!data){ board.innerHTML = "🏆 ترتيب اللاعبين"; return; }
  const players = Object.entries(data).sort((a,b)=>b[1].wins - a[1].wins);
  const topPlayers = players.slice(0,3);
  let html = "🏆 ترتيب اللاعبين<br><br>";
  topPlayers.forEach(([name,info],index)=>{
    let medal = "🏅";
    if(index === 0) medal = "🥇";
    if(index === 1) medal = "🥈";
    if(index === 2) medal = "🥉";
    html += medal + " + name + " : " + info.wins + "<br>";
  });
  board.innerHTML = html;
});

onValue(gamePlayersRef,(snapshot)=>{
  const players = snapshot.val();
  const countBox = document.getElementById("playersCount");
  if(!players){ countBox.textContent = "👥 0"; document.getElementById("gameMode").textContent = "🟢 لا يوجد لاعبو لعبة"; return; }
  const count = Object.keys(players).length;
  countBox.textContent = "👥 " + count;
  document.getElementById("gameMode").textContent = "🎮 لاعبو اللعبة: " + count;

  // قائمة المشاركين + آخر من انضم
  const box = document.getElementById("playersList");
  let html = "👥 المشاركون<br>";
  let lastPlayer = "";
  let latestTime = 0;
  Object.entries(players).sort((a,b)=>b[1].joinedAt - a[1].joinedAt).forEach(([name,data])=>{
    html += "👤 " + (data.name || name) + "<br>";
    if(data.joinedAt > latestTime){ latestTime = data.joinedAt; lastPlayer = data.name || name; }
  });
  box.innerHTML = html;
  document.getElementById("lastJoined").textContent = "آخر من انضم: " + lastPlayer;
});

resizeGame();
</script>
</body>
</html>
