<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marah TV</title>

<style>
body{
margin:0;
font-family:Tahoma,sans-serif;
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
}

.wrap{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
font-size:16px;
}

#messages{
max-height:450px;
overflow:auto;
margin-top:10px;
}

.msg{
padding:10px;
border-bottom:1px solid #334155;
word-break:break-word;
}
</style>

</head>

<body>

<header>
<div>🔴 Marah TV</div>
<div id="clock"></div>
</header>

<div class="wrap">

<div class="card">
<h3>الرسائل المباشرة</h3>

<input id="name" placeholder="اسمك">
<input id="text" placeholder="اكتب رسالة">

<button id="send">إرسال</button>

<div id="messages"></div>
</div>

<div class="card">
<h3>⚔️ ساحة التحدي</h3>

<div id="players">
لا يوجد مشاركون
</div>

<div id="winner">
بانتظار اللاعبين...
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue
set
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyD8yIx-iVO4kCC-92lVHAzrVB7ye6ncbes",
authDomain: "marah-tv-ed147.firebaseapp.com",
databaseURL: "https://marah-tv-ed147-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "marah-tv-ed147",
storageBucket: "marah-tv-ed147.firebasestorage.app",
messagingSenderId: "868399469455",
appId: "1:868399469455:web:15fc7d07b342574c5e71fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db,"messages");
const playersRef = ref(db,"players");
setInterval(()=>{
document.getElementById("clock").textContent =
new Date().toLocaleTimeString("ar");
},1000);

const savedName = localStorage.getItem("marah_name");

if(savedName){
document.getElementById("name").value = savedName;
}

document.getElementById("send").addEventListener("click",()=>{

const name = document.getElementById("name").value.trim();
const text = document.getElementById("text").value.trim();

if(!name || !text) return;
  
alert("تم فحص الرسالة");
  
const bannedWords = [
"كس",
"كسا",
"كسك",
"اير",
"ايري",
"يلعن",
"قحبة",
"كلمة2",
"قحب",
"كلب",
"حيوان",
"خرا",
"حمار",
"منيك",
"انيك",
"جحش",
"حمار",
"كديش",
"شرموطة",
"شرموط",
"منتاك",
"عير",
"بزاز",
"تلحس",
"ترضع",
"بوس",
"بعص",
"ابعص",
"عرصة",
"جلب",
"1234567890"
];

const lowerText = text.toLowerCase();

if(bannedWords.some(word => lowerText.includes(word.toLowerCase()))){
alert("هذه الرسالة تحتوي على كلمات غير مسموح بها");
return;
}

localStorage.setItem("marah_name",name);

push(messagesRef,{
name:name,
text:text,
time:Date.now()
});

if(text.toLowerCase() === "me"){
set(ref(db,"players/" + name),{
name:name
});
}

document.getElementById("text").value="";

});

onValue(messagesRef,(snapshot)=>{

const box = document.getElementById("messages");
box.innerHTML = "";

const data = snapshot.val();

if(!data) return;

Object.values(data)
.sort((a,b)=>b.time-a.time)
.forEach(msg=>{

const div = document.createElement("div");
div.className="msg";
div.textContent = msg.name + ": " + msg.text;

box.appendChild(div);

});

});
onValue(playersRef,(snapshot)=>{

const playersBox = document.getElementById("players");

const data = snapshot.val();

if(!data){
playersBox.innerHTML = "لا يوجد مشاركون";
return;
}

playersBox.innerHTML = "";

Object.values(data).forEach(player=>{

const div = document.createElement("div");
div.textContent = "⚔️ " + player.name;

playersBox.appendChild(div);

});

});

</script>

</body>
</html>
