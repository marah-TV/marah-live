<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marah TV</title>

<style>
body{
margin:0;
font-family:Tahoma,sans-serif;
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
}

.wrap{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
font-size:16px;
}

#messages{
max-height:450px;
overflow:auto;
margin-top:10px;
}

.msg{
padding:10px;
border-bottom:1px solid #334155;
word-break:break-word;
}
</style>

</head>

<body>

<header>
<div>🔴 Marah TV</div>
<div id="clock"></div>
</header>

<div class="wrap">

<div class="card">
<h3>الرسائل المباشرة</h3>

<input id="name" placeholder="اسمك">
<input id="text" placeholder="اكتب رسالة">

<button id="send">إرسال</button>

<div id="messages"></div>
</div>

<div class="card">

<h3>🎯 لعبة الرقم السريع</h3>

<div id="gameStatus">
🚦 الاستعداد للجولة القادمة
</div>

<br>

<div id="countdown">
⏳ 10
</div>

<br>

<div id="targetNumber">
🎯 ؟
</div>

<br>

<div id="gameWinner">
🏆 لا يوجد فائز بعد
</div>
<br>

<div id="autoStatus">
🤖 الروبوت: يعمل
</div>

<br>

<button id="adminBtn">
⚙️ الإدارة
</button>

<div id="adminPanel" style="display:none;">

<button id="startRound">
▶️ بدء جولة
</button>

<button id="toggleBot">
🤖 تشغيل/إيقاف الروبوت
</button>

</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
set,
remove,
get
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyD8yIx-iVO4kCC-92lVHAzrVB7ye6ncbes",
authDomain: "marah-tv-ed147.firebaseapp.com",
databaseURL: "https://marah-tv-ed147-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "marah-tv-ed147",
storageBucket: "marah-tv-ed147.firebasestorage.app",
messagingSenderId: "868399469455",
appId: "1:868399469455:web:15fc7d07b342574c5e71fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gameRef = ref(db,"game");
const messagesRef = ref(db,"messages");

let countdownStarted = false;
let countdown = 15;
setInterval(()=>{
document.getElementById("clock").textContent =
new Date().toLocaleTimeString("ar");
},1000);

const savedName = localStorage.getItem("marah_name");

if(savedName){
document.getElementById("name").value = savedName;
}

document.getElementById("send").addEventListener("click",()=>{

const name = document.getElementById("name").value.trim();
const text = document.getElementById("text").value.trim();

if(!name || !text) return;
  
const bannedWords = [
"كس",
"كسا",
"كسك",
"اير",
"ايري",
"يلعن",
"قحبة",
"كلمة2",
"قحب",
"كلب",
"حيوان",
"خرا",
"حمار",
"منيك",
"انيك",
"جحش",
"حمار",
"كديش",
"شرموطة",
"شرموط",
"منتاك",
"عير",
"بزاز",
"تلحس",
"ترضع",
"بوس",
"بعص",
"ابعص",
"عرصة",
"جلب",
"1234567890"
];

const lowerText = text.toLowerCase();

if(bannedWords.some(word => lowerText.includes(word.toLowerCase()))){
alert("هذه الرسالة تحتوي على كلمات غير مسموح بها");
return;
}

localStorage.setItem("marah_name",name);

if(
text.toLowerCase() !== "me" &&
text.toLowerCase() !== "leave"
){
push(messagesRef,{
name:name,
text:text,
time:Date.now()
});
}

if(text.toLowerCase() === "me"){
set(ref(db,"players/" + name),{
name:name
});
}
  
if(text.toLowerCase() === "leave"){
remove(ref(db,"players/" + name));
}
document.getElementById("text").value="";

});

onValue(messagesRef,(snapshot)=>{

const box = document.getElementById("messages");
box.innerHTML = "";

const data = snapshot.val();

if(!data) return;

Object.values(data)
.sort((a,b)=>b.time-a.time)
.forEach(msg=>{

const div = document.createElement("div");
div.className="msg";
div.textContent = msg.name + ": " + msg.text;

box.appendChild(div);

});

});
let botEnabled = true;
let gameRunning = false;

function startGame(){

if(gameRunning) return;

gameRunning = true;

let countdown = 10;

const countdownBox =
document.getElementById("countdown");

const statusBox =
document.getElementById("gameStatus");

const numberBox =
document.getElementById("targetNumber");

statusBox.textContent =
"🚦 استعدوا للجولة القادمة";

numberBox.textContent =
"🎯 ؟";

const interval = setInterval(()=>{

countdownBox.textContent =
"⏳ " + countdown;

countdown--;

if(countdown < 0){

clearInterval(interval);

statusBox.textContent =
"🔥 انتظار الرقم من Firebase";

gameRunning = false;

}

},1000);

}
onValue(gameRef,(snapshot)=>{

const data = snapshot.val();

if(!data) return;

if(data.targetNumber){

document.getElementById("targetNumber").textContent =
"🎯 الرقم المطلوب: " + data.targetNumber;

}

if(true){

document.getElementById("gameWinner").textContent =
"🏆 الفائز: " + data.winner;

}else{

document.getElementById("gameWinner").textContent =
"🏆 لا يوجد فائز بعد";

}

});

document.getElementById("toggleBot").addEventListener("click",()=>{

alert("تم الضغط على الزر");

botEnabled = !botEnabled;

document.getElementById("autoStatus").textContent =
botEnabled ? "🤖 الروبوت: يعمل" : "⛔ الروبوت متوقف";

});
  
document.getElementById("adminBtn").addEventListener("click",()=>{

const panel =
document.getElementById("adminPanel");

if(panel.style.display === "none"){

panel.style.display = "block";

}else{

panel.style.display = "none";

}

});

document.getElementById("startRound").addEventListener("click",()=>{

const targetNumber =
Math.floor(Math.random() * 100) + 1;

set(gameRef,{
targetNumber: targetNumber,
status: "playing",
winner: ""
});

});
  
startGame();
</script>

</body>
</html>
